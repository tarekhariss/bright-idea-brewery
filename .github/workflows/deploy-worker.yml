name: Deploy Verifier Worker to Contabo VPS

on:
  push:
    branches: [main]
    paths:
      - 'external/verifier-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REPO_PATH: ${{ secrets.VPS_REPO_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -s <<'EOF'
            set -euo pipefail
            cd "${REPO_PATH:-/opt/tlbg-verifier-worker}"
            git fetch --all --prune
            git reset --hard origin/main
            cd external/verifier-worker

            # Cleanup using Docker Compose v2 (legacy docker-compose retired)
            docker compose down --remove-orphans || true
            docker rm -f tlbg-email-verifier tlbg-verifier-worker || true
            docker ps -a --format '{{.ID}} {{.Names}}' | grep -E 'tlbg-email-verifier|tlbg-verifier-worker|email-verifier|verifier-worker' | awk '{print $1}' | xargs -r docker rm -f || true
            docker container prune -f || true

            # Primary deploy with one self-healing retry
            if ! docker compose up -d --build --force-recreate --remove-orphans; then
              echo "[deploy] First 'up' failed — cleaning containers and retrying once..."
              docker compose down --remove-orphans || true
              docker rm -f tlbg-email-verifier tlbg-verifier-worker || true
              docker ps -a --format '{{.ID}} {{.Names}}' | grep -E 'tlbg-email-verifier|tlbg-verifier-worker|email-verifier|verifier-worker' | awk '{print $1}' | xargs -r docker rm -f || true
              docker container prune -f || true
              docker compose up -d --build --force-recreate --remove-orphans
            fi

            docker image prune -f
            docker compose ps
          EOF

      - name: Health check
        run: |
          echo "Deploy triggered. Check worker heartbeat in the platform."
